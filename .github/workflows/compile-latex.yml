name: Compile LaTeX document

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build_latex:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v4

      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          # The action will automatically run pdflatex (or latexmk by default)
          # and output main.pdf

      - name: Upload PDF file
        uses: actions/upload-artifact@v4
        with:
          name: compiled-pdf-report
          path: main.pdf
